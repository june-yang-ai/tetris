<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <h1>Tetris</h1>
    <div class="game-layout">
      <div class="main-panel">
        <div id="game-board" class="board" aria-label="테트리스 보드"></div>
        <div id="game-over" class="overlay hidden" aria-hidden="true">
          <p class="overlay-title">GAME OVER</p>
          <p class="overlay-hint">R키로 재시작</p>
        </div>
        <div id="paused" class="overlay hidden" aria-hidden="true">
          <p class="overlay-title">PAUSED</p>
          <p class="overlay-hint">P키로 재개</p>
        </div>
      </div>
      <aside class="side-panel">
        <div class="stat-box">
          <h2>점수</h2>
          <p id="score">0</p>
        </div>
        <div class="stat-box">
          <h2>레벨</h2>
          <p id="level">1</p>
        </div>
        <div class="stat-box">
          <h2>라인</h2>
          <p id="lines">0</p>
        </div>
        <div class="stat-box">
          <h2>다음</h2>
          <div id="next-board" class="next-board" aria-label="다음 블록"></div>
        </div>
        <div class="controls-help">
          <h2>조작</h2>
          <ul>
            <li>← → : 이동</li>
            <li>↑ : 회전</li>
            <li>↓ : 소프트 드롭</li>
            <li>Space : 하드 드롭</li>
            <li>P : 일시정지</li>
            <li>R : 재시작</li>
          </ul>
        </div>
      </aside>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
